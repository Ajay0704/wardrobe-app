<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><title>Closet redesign — prototype</title>
<style>
:root{--background:#faf9f7;--surface:#fff;--surface-2:#f3f1ed;--border:#e7e4de;--foreground:#1c1917;--muted:#79716b;--accent:#b05e3c;--accent-soft:#f6e9e2;--accent-foreground:#fff}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#cfcac2;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",ui-sans-serif,system-ui,sans-serif;color:var(--foreground);display:flex;justify-content:center;padding:24px 12px;min-height:100vh}
.phone{width:393px;max-width:100%;background:var(--background);border-radius:44px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.28);border:1px solid #0002}
.sbar{display:flex;justify-content:space-between;align-items:center;padding:14px 26px 6px;font-size:14px;font-weight:600}
.sbar .r{display:flex;gap:6px;font-size:15px}
.hd{padding:6px 18px 2px;display:flex;justify-content:space-between;align-items:center}
.hd h1{font-size:28px;font-weight:600;letter-spacing:-.02em}
.hd .ic{color:var(--muted);font-size:22px}
.barwrap{display:flex;gap:10px;align-items:center;padding:14px 16px 12px}
.seg{flex:1;display:flex;background:var(--surface-2);border-radius:11px;padding:3px}
.seg button{flex:1;border:0;background:transparent;font:inherit;font-size:14px;color:var(--muted);padding:8px 4px;border-radius:8px;cursor:pointer}
.seg button.on{background:var(--surface);color:var(--foreground);font-weight:500;box-shadow:0 1px 2px #0000000f}
.newb{width:40px;height:40px;flex:0 0 auto;border-radius:11px;border:1px solid var(--border);background:var(--surface);color:var(--foreground);font-size:22px;cursor:pointer}
.panel{display:none}.panel.on{display:block}
.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));border-top:1px solid var(--border)}
.tile{min-width:0;border:0;background:transparent;text-align:left;padding:0;cursor:pointer;border-bottom:1px solid var(--border);border-right:1px solid var(--border)}
.tile:nth-child(3n){border-right:0}
.sq{aspect-ratio:1;background:#fff;display:flex;align-items:center;justify-content:center}
.sq img{width:100%;height:100%;object-fit:contain}
.meta{min-width:0;padding:6px 9px 9px}
.brand{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.name{font-size:13px;color:var(--foreground);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.build{margin:2px 16px 14px;display:flex;align-items:center;gap:12px;background:var(--accent-soft);border:1px solid #e9d3c6;border-radius:14px;padding:15px 16px;cursor:pointer}
.build .ci{width:40px;height:40px;flex:0 0 auto;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px}
.build .bt{font-size:15px;font-weight:500}.build .bs{font-size:13px;color:var(--muted)}
.hint{font-size:12px;color:var(--muted);padding:2px 18px 10px}
.sharelist{padding:0 16px 16px;display:flex;flex-direction:column;gap:10px}
.sc{display:flex;align-items:center;gap:12px;width:100%;border:1px solid var(--border);background:var(--surface);border-radius:14px;padding:11px 13px;cursor:pointer;text-align:left}
.av{width:40px;height:40px;flex:0 0 auto;border-radius:50%;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600}
.scmid{flex:1;min-width:0}.scn{font-size:15px;color:var(--foreground)}.scc{font-size:12px;color:var(--muted)}
.scpeek{display:flex;gap:3px;flex:0 0 auto}.scpeek img{width:30px;height:30px;border-radius:6px;object-fit:contain;background:#fff;border:1px solid var(--border)}
.chev{color:var(--muted);font-size:22px;flex:0 0 auto}
.tabbar{display:flex;justify-content:space-around;align-items:center;padding:9px 6px 26px;border-top:1px solid var(--border);background:color-mix(in srgb,var(--background) 92%,transparent)}
.tb{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11px;color:var(--muted)}
.tb.on{color:var(--accent)}
.tb .g{font-size:24px;line-height:1}
.plus{width:52px;height:52px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:30px;margin-top:-14px;box-shadow:0 6px 16px #b05e3c55}
</style></head><body>
<div class="phone">
  <div class="sbar"><span>9:41</span><span class="r">&#9679;&#9679;&#9679; 5G &#9636;</span></div>
  <div class="hd"><h1>Closet</h1><span class="ic">&#9776;</span></div>
  <div class="barwrap">
    <div class="seg"><button class="on" data-t="items">Items</button><button data-t="wishlist">Wishlist</button><button data-t="shared">Shared</button></div>
    <button class="newb" id="newb" title="Add item">+</button>
  </div>
  <div class="panel on" id="items"><div class="grid"><button class="tile"><div class="sq"><img loading="lazy" src="https://hfkgucfrqpzpxdzhszgb.supabase.co/storage/v1/object/public/wardrobe-images/4cea3e46-1f1b-4457-b57f-a02c2b6d5e1e/af38daba-8d20-4c11-ad0f-3b0beebb55cd.jpg" alt="Black Two-Piece Suit"></div><div class="meta"><p class="brand">No brand</p><p class="name">Black Two-Piece Suit</p></div></button><button class="tile"><div class="sq"><img loading="lazy" src="https://hfkgucfrqpzpxdzhszgb.supabase.co/storage/v1/object/public/wardrobe-images/4cea3e46-1f1b-4457-b57f-a02c2b6d5e1e/154b54c7-b664-42ac-b712-d37cea4c9a9d.png" alt="Grey Quarter-Zip Long-Sleeve Top"></div><div class="meta"><p class="brand">Gymshark</p><p class="name">Grey Quarter-Zip Long-Sleeve Top</p></div></button><button class="tile"><div class="sq"><img loading="lazy" src="https://hfkgucfrqpzpxdzhszgb.supabase.co/storage/v1/object/public/wardrobe-images/4cea3e46-1f1b-4457-b57f-a02c2b6d5e1e/1c9f8ce4-1959-461c-890b-c85633de7a15.png" alt="Scuderia Ferrari Red Team Polo Shirt"></div><div class="meta"><p class="brand">Puma</p><p class="name">Scuderia Ferrari Red Team Polo Shirt</p></div></button><button class="tile"><div class="sq"><img loading="lazy" src="https://hfkgucfrqpzpxdzhszgb.supabase.co/storage/v1/object/public/wardrobe-images/4cea3e46-1f1b-4457-b57f-a02c2b6d5e1e/338fd2f0-03c8-4fbb-9e97-32bef4b0bc7b.png" alt="Louis Vuitton Monogram Motif Black Sweatshirt"></div><div class="meta"><p class="brand">Louis Vuitton</p><p class="name">Louis Vuitton Monogram Motif Black Sweatshirt</p></div></button><button class="tile"><div class="sq"><img loading="lazy" src="https://hfkgucfrqpzpxdzhszgb.supabase.co/storage/v1/object/public/wardrobe-images/4cea3e46-1f1b-4457-b57f-a02c2b6d5e1e/5c51f289-20fa-4881-a521-731b0fde792c.jpg" alt="Cream Cable-Knit Quarter-Zip Sweater"></div><div class="meta"><p class="brand">Polo Ralph Lauren</p><p class="name">Cream Cable-Knit Quarter-Zip Sweater</p></div></button><button class="tile"><div class="sq"><img loading="lazy" src="https://hfkgucfrqpzpxdzhszgb.supabase.co/storage/v1/object/public/wardrobe-images/4cea3e46-1f1b-4457-b57f-a02c2b6d5e1e/085b664c-942b-4e8c-8fb6-c1e735801e5a.png" alt="Beige Jacket"></div><div class="meta"><p class="brand">No brand</p><p class="name">Beige Jacket</p></div></button><button class="tile"><div class="sq"><img loading="lazy" src="https://hfkgucfrqpzpxdzhszgb.supabase.co/storage/v1/object/public/wardrobe-images/4cea3e46-1f1b-4457-b57f-a02c2b6d5e1e/68e85485-19e0-4029-8c86-39a99bbcbcf0.jpg" alt="Black Tailored Suit Jacket"></div><div class="meta"><p class="brand">No brand</p><p class="name">Black Tailored Suit Jacket</p></div></button><button class="tile"><div class="sq"><img loading="lazy" src="https://hfkgucfrqpzpxdzhszgb.supabase.co/storage/v1/object/public/wardrobe-images/4cea3e46-1f1b-4457-b57f-a02c2b6d5e1e/2320101b-865b-43ae-ac39-28049ecb3a3b.png" alt="Suit"></div><div class="meta"><p class="brand">No brand</p><p class="name">Suit</p></div></button></div></div>
  <div class="panel" id="wishlist"><p class="hint">7 pieces you want &#183; tap the heart on any item to save</p><div class="grid"><button class="tile"><div class="sq"><img loading="lazy" src="https://hfkgucfrqpzpxdzhszgb.supabase.co/storage/v1/object/public/wardrobe-images/4cea3e46-1f1b-4457-b57f-a02c2b6d5e1e/d7d204dc-938c-4204-8041-c3e46391a641.jpg" alt="FFF The Nike Polo Men's Nike Dri-FIT Soccer Polo"></div><div class="meta"><p class="brand">Nike</p><p class="name">FFF The Nike Polo Men's Nike Dri-FIT Soccer Polo</p></div></button><button class="tile"><div class="sq"><img loading="lazy" src="https://static.nike.com/a/images/t_default/d9c7864a-7e02-423e-87e1-fefc6c60a10e/FFF+M+NK+DF+STRK+DRILL+TOP+K.png" alt="FFF Strike Men's Nike Dri-FIT Soccer Drill Top"></div><div class="meta"><p class="brand">Nike</p><p class="name">FFF Strike Men's Nike Dri-FIT Soccer Drill Top</p></div></button><button class="tile"><div class="sq"><img loading="lazy" src="https://static.nike.com/a/images/t_default/9ebff8bd-05ec-49fc-9eac-6814ca4319c9/FFF+M+NSW+CLUB+HOODIE+PO+FT.png" alt="FFF Club Men's Nike Soccer French Terry Pullover Hoodie"></div><div class="meta"><p class="brand">Nike</p><p class="name">FFF Club Men's Nike Soccer French Terry Pullover Hoodie</p></div></button><button class="tile"><div class="sq"><img loading="lazy" src="https://hfkgucfrqpzpxdzhszgb.supabase.co/storage/v1/object/public/wardrobe-images/4cea3e46-1f1b-4457-b57f-a02c2b6d5e1e/9645a28c-a122-4290-b9b7-874da62847af.jpg" alt="Spain Home Football Jersey"></div><div class="meta"><p class="brand">adidas</p><p class="name">Spain Home Football Jersey</p></div></button><button class="tile"><div class="sq"><img loading="lazy" src="https://hfkgucfrqpzpxdzhszgb.supabase.co/storage/v1/object/public/wardrobe-images/4cea3e46-1f1b-4457-b57f-a02c2b6d5e1e/8077582c-32c1-4c8c-b6fa-75120b547067.jpg" alt="Adidas Adizero Evo SL Running Shoes"></div><div class="meta"><p class="brand">adidas</p><p class="name">Adidas Adizero Evo SL Running Shoes</p></div></button><button class="tile"><div class="sq"><img loading="lazy" src="https://hfkgucfrqpzpxdzhszgb.supabase.co/storage/v1/object/public/wardrobe-images/4cea3e46-1f1b-4457-b57f-a02c2b6d5e1e/be7c72af-70df-4c9d-bf1f-c5bc8627abc0.jpg" alt="Long-Sleeve Polo"></div><div class="meta"><p class="brand">No brand</p><p class="name">Long-Sleeve Polo</p></div></button><button class="tile"><div class="sq"><img loading="lazy" src="https://hfkgucfrqpzpxdzhszgb.supabase.co/storage/v1/object/public/wardrobe-images/4cea3e46-1f1b-4457-b57f-a02c2b6d5e1e/df6ee231-ed6d-4a86-86a6-91eeca69001e.jpg" alt="T-shirt"></div><div class="meta"><p class="brand">ALLSAINTS</p><p class="name">T-shirt</p></div></button></div></div>
  <div class="panel" id="shared"><div class="build"><div class="ci">&#8599;</div><div><div class="bt">Share your closet</div><div class="bs">Send a link so friends can view it</div></div></div><p class="hint">Shared with you</p><div class="sharelist"><button class="sc"><div class="av">AR</div><div class="scmid"><p class="scn">Alex Rivera</p><p class="scc">24 pieces</p></div><div class="scpeek"><img src="https://hfkgucfrqpzpxdzhszgb.supabase.co/storage/v1/object/public/wardrobe-images/4cea3e46-1f1b-4457-b57f-a02c2b6d5e1e/af38daba-8d20-4c11-ad0f-3b0beebb55cd.jpg"><img src="https://hfkgucfrqpzpxdzhszgb.supabase.co/storage/v1/object/public/wardrobe-images/4cea3e46-1f1b-4457-b57f-a02c2b6d5e1e/154b54c7-b664-42ac-b712-d37cea4c9a9d.png"><img src="https://hfkgucfrqpzpxdzhszgb.supabase.co/storage/v1/object/public/wardrobe-images/4cea3e46-1f1b-4457-b57f-a02c2b6d5e1e/1c9f8ce4-1959-461c-890b-c85633de7a15.png"></div><span class="chev">&#8250;</span></button><button class="sc"><div class="av">PS</div><div class="scmid"><p class="scn">Priya Shah</p><p class="scc">31 pieces</p></div><div class="scpeek"><img src="https://hfkgucfrqpzpxdzhszgb.supabase.co/storage/v1/object/public/wardrobe-images/4cea3e46-1f1b-4457-b57f-a02c2b6d5e1e/d7d204dc-938c-4204-8041-c3e46391a641.jpg"><img src="https://static.nike.com/a/images/t_default/d9c7864a-7e02-423e-87e1-fefc6c60a10e/FFF+M+NK+DF+STRK+DRILL+TOP+K.png"><img src="https://static.nike.com/a/images/t_default/9ebff8bd-05ec-49fc-9eac-6814ca4319c9/FFF+M+NSW+CLUB+HOODIE+PO+FT.png"></div><span class="chev">&#8250;</span></button></div></div>
  <div class="tabbar">
    <div class="tb"><span class="g">&#9678;</span>Explore</div>
    <div class="tb on"><span class="g">&#9636;</span>Closet</div>
    <div class="tb"><span class="plus">+</span></div>
    <div class="tb"><span class="g">&#9783;</span>Outfits</div>
    <div class="tb"><span class="g">&#8962;</span>Home</div>
  </div>
</div>
<script>
const segs=[...document.querySelectorAll(".seg button")],panels={};
["items","wishlist","shared"].forEach(k=>panels[k]=document.getElementById(k));
const nb=document.getElementById("newb");
function show(t){segs.forEach(b=>b.classList.toggle("on",b.dataset.t===t));Object.keys(panels).forEach(k=>panels[k].classList.toggle("on",k===t));nb.title=t==="wishlist"?"Add wishlist item":t==="shared"?"Share your closet":"Add item";}
segs.forEach(b=>b.addEventListener("click",()=>show(b.dataset.t)));
</script></body></html>
